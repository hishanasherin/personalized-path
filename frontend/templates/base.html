<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Personalized Path{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

{% block navbar %}
<nav class="navbar">
  <div class="navbar-inner">
    <a href="{{ url_for('index') }}" class="navbar-brand">
      <span class="brand-dot"></span>
      Personalized Path
    </a>
    <div class="navbar-links">
      {% if session.get('user_id') %}
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('profile') }}">Profile</a>
        <a href="{{ url_for('history') }}">History</a>
        <a href="{{ url_for('logout') }}" class="btn btn-ghost btn-sm" style="margin-left:6px">Logout</a>
      {% else %}
        <a href="{{ url_for('login') }}">Login</a>
        <a href="{{ url_for('register') }}" class="btn btn-primary btn-sm" style="margin-left:6px">Get Started</a>
      {% endif %}
    </div>
  </div>
</nav>
{% endblock %}

{% block content %}{% endblock %}

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
